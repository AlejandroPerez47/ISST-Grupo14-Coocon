# ─── Base de datos en memoria (H2) ────────────────────────────────
spring.datasource.url=jdbc:h2:mem:tourist_cocoon;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE;MODE=PostgreSQL
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# Habilitar la consola de H2 en el navegador (http://localhost:8080/h2-console)
spring.h2.console.enabled=true

# ─── JPA / Hibernate ───────────────────────────────────────────────
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# ─── Servidor ──────────────────────────────────────────────────────
server.port=8080

# ─── Jackson (fechas como strings ISO 8601) ────────────────────────
spring.jackson.serialization.write-dates-as-timestamps=false
